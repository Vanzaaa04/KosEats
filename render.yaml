services:
  - type: web
    name: koseats-api
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: koseats-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://koseats-frontend.vercel.app # Ganti dengan URL Vercel Anda nanti
      - key: PORT
        value: 5000

databases:
  - name: koseats-db
    databaseName: koseats
    user: koseats_admin
    plan: free
